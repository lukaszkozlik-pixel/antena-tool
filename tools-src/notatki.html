<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notatki Instalatora</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background: #fff;
            margin: 0;
            font-family: -apple-system, sans-serif;
            color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: #1a73e8;
            color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            position: relative;
            min-height: 50px;
            box-sizing: border-box;
        }
        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2;
            padding: 0;
            margin: 0;
        }
        h1 {
            font-size: 1.1rem;
            margin: 0;
            position: absolute;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
        }
        .search-bar {
            padding: 10px 15px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }
        #searchNote {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
        }
        .notes-list {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        .note-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border: 1px solid #e0e0e0;
            position: relative;
        }
        .note-text {
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            outline: none;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .note-text:focus {
            background: #f0f7ff;
            border: 1px dashed #1a73e8;
        }
        .note-date {
            font-size: 0.7rem;
            color: #999;
            margin-top: 10px;
            display: block;
        }
        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ffeeee;
            color: #d32f2f;
            border: none;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: bold;
            cursor: pointer;
        }
        .add-note-area {
            background: #f5f5f5;
            padding: 15px;
            border-top: 1px solid #e0e0e0;
        }
        #noteInput {
            width: 100%;
            height: 60px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(.4,2,.6,1);
            z-index: 1001;
        }
        #noteInput.expanded {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            background: var(--tile-bg, #fff);
            font-size: 1.2rem;
            padding: 30px 20px 90px 20px;
            z-index: 1002;
            box-shadow: none;
        }
        .btn-save {
            background: #1a73e8;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
            position: static;
            z-index: 1;
            transition: box-shadow 0.2s;
        }
        .btn-save.fixed {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100vw;
            border-radius: 0;
            margin: 0;
            z-index: 2002;
            box-shadow: 0 -2px 16px rgba(0,0,0,0.10);
        }
        .note-image-thumb {
            position: relative;
            display: inline-block;
        }
        .note-image-thumb img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }
        .note-image-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #fff;
            color: #d32f2f;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 1.1rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
            cursor: pointer;
            z-index: 2;
        }
        .noteInput-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.25);
            z-index: 1001;
            display: none;
        }
        .noteInput-overlay.active {
            display: block;
        }
        .noteInput-close {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 1003;
            background: #fff;
            color: #1a73e8;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            display: none;
        }
        .noteInput-close.active {
            display: block;
        }
    </style>
</head>

<body>
<div id="editNoteModal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:3000;background:rgba(0,0,0,0.35);align-items:center;justify-content:center;">
    <div style="background:var(--tile-bg,#fff);padding:20px 15px 15px 15px;border-radius:12px;max-width:95vw;width:400px;box-shadow:0 4px 32px rgba(0,0,0,0.18);position:relative;">
        <button id="editNoteClose" style="position:absolute;top:10px;right:10px;background:#fff;color:#1a73e8;border:none;border-radius:50%;width:28px;height:28px;font-size:1.2rem;cursor:pointer;">×</button>
        <textarea id="editNoteText" style="width:100%;min-height:70px;border-radius:8px;padding:10px;margin-bottom:10px;"></textarea>
        <input type="file" id="editNoteImageInput" accept="image/*" multiple style="margin-bottom:10px;width:100%;">
        <div id="editNoteImagePreview" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;"></div>
        <button id="editNoteSave" style="width:100%;background:#1a73e8;color:#fff;border:none;padding:10px 0;border-radius:8px;font-weight:bold;">ZAPISZ</button>
    </div>
</div>

<header>
    <button class="btn-back" onclick="window.location.replace('../index.html')">◀</button>
    <h1>Notatki</h1>
</header>

<div class="search-bar">
    <input type="text" id="searchNote" placeholder="Szukaj w notatkach..." oninput="displayNotes()">
</div>

<div class="notes-list" id="notesList"></div>

<div class="add-note-area">
    <div id="noteInputOverlay" class="noteInput-overlay"></div>
    <button id="noteInputClose" class="noteInput-close" title="Zamknij" tabindex="-1">×</button>
    <textarea id="noteInput" placeholder="Nowa notatka..."></textarea>
    <input type="file" id="noteImageInput" accept="image/*" multiple style="margin-top:10px; width:100%;">
    <div id="noteImagePreview" style="display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 0 0;"></div>
    <button id="btnSave" class="btn-save" onclick="addNote()">DODAJ</button>
</div>

<script>
// --- LOGIKA NOTATEK Z INDEXEDDB ---
window.openEditNote = openEditNote;
const noteInput = document.getElementById('noteInput');
const noteInputOverlay = document.getElementById('noteInputOverlay');
const noteInputClose = document.getElementById('noteInputClose');
const btnSave = document.getElementById('btnSave');
const noteImageInput = document.getElementById('noteImageInput');
let noteImageData = [];
const noteImagePreview = document.getElementById('noteImagePreview');

// IndexedDB helpers
let db = null;
function openDB() {
    return new Promise((resolve, reject) => {
        if (db) return resolve(db);
        const request = indexedDB.open('inst-notes-db', 1);
        request.onupgradeneeded = function(e) {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('notes')) {
                db.createObjectStore('notes', { keyPath: 'id' });
            }
        };
        request.onsuccess = function(e) {
            db = e.target.result;
            resolve(db);
        };
        request.onerror = function(e) {
            reject(e);
        };
    });
}
function getAllNotes() {
    return openDB().then(db => {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('notes', 'readonly');
            const store = tx.objectStore('notes');
            const req = store.getAll();
            req.onsuccess = () => resolve(req.result.sort((a, b) => b.id - a.id));
            req.onerror = reject;
        });
    });
}
function addNoteToDB(note) {
    return openDB().then(db => {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('notes', 'readwrite');
            const store = tx.objectStore('notes');
            store.add(note);
            tx.oncomplete = resolve;
            tx.onerror = reject;
        });
    });
}
function updateNoteInDB(note) {
    return openDB().then(db => {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('notes', 'readwrite');
            const store = tx.objectStore('notes');
            store.put(note);
            tx.oncomplete = resolve;
            tx.onerror = reject;
        });
    });
}
function deleteNoteFromDB(id) {
    return openDB().then(db => {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('notes', 'readwrite');
            const store = tx.objectStore('notes');
            store.delete(id);
            tx.oncomplete = resolve;
            tx.onerror = reject;
        });
    });
}
function getNoteById(id) {
    return openDB().then(db => {
        return new Promise((resolve, reject) => {
            const tx = db.transaction('notes', 'readonly');
            const store = tx.objectStore('notes');
            const req = store.get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = reject;
        });
    });
}

function expandNoteInput() {
    noteInput.classList.add('expanded');
    noteInputOverlay.classList.add('active');
    noteInputClose.classList.add('active');
    btnSave.classList.add('fixed');
    setTimeout(() => noteInput.select && noteInput.select(), 10);
}
function collapseNoteInput() {
    noteInput.classList.remove('expanded');
    noteInputOverlay.classList.remove('active');
    noteInputClose.classList.remove('active');
    btnSave.classList.remove('fixed');
    noteInput.blur();
}
noteInput.addEventListener('focus', expandNoteInput);
noteInputClose.addEventListener('click', collapseNoteInput);
noteInputOverlay.addEventListener('click', collapseNoteInput);

function renderImagePreview() {
    noteImagePreview.innerHTML = '';
    noteImageData.forEach((imgData, idx) => {
        const thumb = document.createElement('div');
        thumb.className = 'note-image-thumb';
        const img = document.createElement('img');
        img.src = imgData;
        const btn = document.createElement('button');
        btn.className = 'note-image-remove';
        btn.innerHTML = '&times;';
        btn.title = 'Usuń zdjęcie';
        btn.onclick = function() {
            noteImageData.splice(idx, 1);
            renderImagePreview();
        };
        thumb.appendChild(img);
        thumb.appendChild(btn);
        noteImagePreview.appendChild(thumb);
    });
}
noteImageInput.addEventListener('change', function(e) {
    noteImageData = [];
    const files = Array.from(e.target.files);
    let loaded = 0;
    if (!files.length) renderImagePreview();
    files.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = function(evt) {
            noteImageData.push(evt.target.result);
            loaded++;
            if (loaded === files.length) renderImagePreview();
        };
        reader.readAsDataURL(file);
    });
});

async function addNote() {
    const input = document.getElementById('noteInput');
    if (!input.value.trim()) return;
    const note = {
        id: Date.now(),
        text: input.value,
        date: new Date().toLocaleString('pl-PL'),
        images: noteImageData.length ? [...noteImageData] : []
    };
    await addNoteToDB(note);
    input.value = "";
    noteImageInput.value = "";
    noteImageData = [];
    noteImagePreview.innerHTML = '';
    displayNotes();
    collapseNoteInput && collapseNoteInput();
}

async function deleteNote(id) {
    if (navigator.notification) {
        navigator.notification.confirm(
            "Usunąć tę notatkę?",
            async function(buttonIndex) {
                if (buttonIndex === 1) {
                    await deleteNoteFromDB(id);
                    displayNotes();
                }
            },
            "Notatki",
            ["Tak", "Nie"]
        );
    } else {
        if (confirm("Usunąć?")) {
            await deleteNoteFromDB(id);
            displayNotes();
        }
    }
}

async function updateNote(id, newText, newImages) {
    const note = await getNoteById(id);
    if (note) {
        note.text = newText;
        if (newImages) note.images = newImages;
        await updateNoteInDB(note);
    }
}

async function displayNotes() {
    const list = document.getElementById('notesList');
    const query = document.getElementById('searchNote').value.toLowerCase();
    const notes = (await getAllNotes()).filter(n => n.text.toLowerCase().includes(query));
    list.innerHTML = notes.map(note => `
        <div class="note-card" onclick="openEditNote(${note.id})">
            <button class="btn-delete" onclick="event.stopPropagation();deleteNote(${note.id})">USUŃ</button>
            <div class="note-text">${note.text}</div>
            ${note.images && note.images.length ? note.images.map(img => `<img src=\"${img}\" alt=\"Załączone zdjęcie\" style=\"max-width:100%;margin-top:10px;border-radius:8px;\">`).join('') : ''}
            <span class="note-date">${note.date}</span>
        </div>
    `).join('') || '<p style="text-align:center;color:#999">Brak notatek</p>';
    window.openEditNote = openEditNote;
}

// --- MODAL EDYCJI NOTATKI ---
let editNoteId = null;
let editNoteImages = [];
const editNoteModal = document.getElementById('editNoteModal');
const editNoteText = document.getElementById('editNoteText');
const editNoteImageInput = document.getElementById('editNoteImageInput');
const editNoteImagePreview = document.getElementById('editNoteImagePreview');
const editNoteSave = document.getElementById('editNoteSave');
const editNoteClose = document.getElementById('editNoteClose');
function renderEditImagePreview() {
    editNoteImagePreview.innerHTML = '';
    editNoteImages.forEach((imgData, idx) => {
        const thumb = document.createElement('div');
        thumb.className = 'note-image-thumb';
        const img = document.createElement('img');
        img.src = imgData;
        const btn = document.createElement('button');
        btn.className = 'note-image-remove';
        btn.innerHTML = '&times;';
        btn.title = 'Usuń zdjęcie';
        btn.onclick = function() {
            editNoteImages.splice(idx, 1);
            renderEditImagePreview();
        };
        thumb.appendChild(img);
        thumb.appendChild(btn);
        editNoteImagePreview.appendChild(thumb);
    });
}
async function openEditNote(id) {
    const note = await getNoteById(id);
    if (!note) return;
    editNoteId = id;
    editNoteText.value = note.text;
    editNoteImages = note.images ? [...note.images] : [];
    renderEditImagePreview();
    editNoteModal.style.display = 'flex';
}
editNoteClose.onclick = function() {
    editNoteModal.style.display = 'none';
    editNoteId = null;
    editNoteText.value = '';
    editNoteImages = [];
    renderEditImagePreview();
};
editNoteImageInput.addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    let loaded = 0;
    if (!files.length) renderEditImagePreview();
    files.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = function(evt) {
            editNoteImages.push(evt.target.result);
            loaded++;
            if (loaded === files.length) renderEditImagePreview();
        };
        reader.readAsDataURL(file);
    });
});
editNoteSave.onclick = async function() {
    if (!editNoteId) return;
    await updateNote(editNoteId, editNoteText.value, [...editNoteImages]);
    displayNotes();
    editNoteModal.style.display = 'none';
    editNoteId = null;
    editNoteText.value = '';
    editNoteImages = [];
    renderEditImagePreview();
};
function loadNotes() { displayNotes(); }
</script>

</body>
</html>
